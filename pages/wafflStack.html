<!DOCTYPE html>

<html>
    <head> 
        <title>stack 'em up</title>
        <link rel="icon" type="image/x-icon" href="/wafflLand/images/favicon.ico">
        <link rel="stylesheet" href="/wafflLand/styles/style.css">
        <link rel="stylesheet" href="wafflStack.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Sour+Gummy:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    </head>
    <body> 
        <div class="main">
            <div class="header">
                <header>
                    <h1>WafflStack</h1>
                    <h4>An aromatic cafe</h4>
                </header>
            </div>
            <div class="container">
                <div>
                    <div class="waffle">
                        <p>Order some waffles!</p>
                        <button onclick="orderWaffl()">Order</button>
                    </div>
                    <div class="waffle">
                        <p>Eat some waffles!</p>
                        <button onclick="eatWaffl()">Eat</button>
                    </div>
                </div>
            </div>
            <div class="container">
                <div class="order">
                    <div id="plate" class="stack"></div>
                    <div class="plating"> </div>
                </div>
            </div>
            <div class="footer">
                    <a class="link" href="javascript:window.history.back();">Back to the Last Page</a><br>
                    <a class="link" href="/everything/index.html">Back to the Beginning</a><br>
                    <a class="link" href="mailto:copynamever@gmail.com">My Email!</a>
                    <p><i>
                        Legendary bottom text :)
                    </i></p>
                </footer>
            </div>
        </div>
        <script src="/scripts/script.js"></script>
        <script src="wafflStack.js"></script>
    </body>
</html>
